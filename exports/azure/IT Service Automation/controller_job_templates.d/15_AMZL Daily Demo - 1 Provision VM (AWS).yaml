---
controller_templates:
  - name: "AMZL Daily Demo - 1 Provision VM (AWS)"
    organization: "IT Service Automation"
    project: "AMZL Daily Demo"
    inventory: "amzl-dailydemo-control"
    playbook: "playbooks/provision_vm_aws.yml"
    scm_branch: ""
    forks: 0
    limit: ""
    verbosity: 0
    job_type: "run"
    job_slice_count: 1
    use_fact_cache: false
    credentials:
      - "AMZL Daily Demo - AWS"
      - "AMZL Daily Demo - Controller"
      - "AMZL Daily Demo - Secrets"
    allow_simultaneous: false
    ask_scm_branch_on_launch: false
    ask_diff_mode_on_launch: false
    ask_tags_on_launch: false
    ask_skip_tags_on_launch: false
    ask_job_type_on_launch: false
    ask_verbosity_on_launch: false
    ask_variables_on_launch: false
    ask_inventory_on_launch: false
    ask_limit_on_launch: false
    ask_credential_on_launch: false
    ask_execution_environment_on_launch: false
    ask_labels_on_launch: false
    ask_forks_on_launch: false
    ask_job_slice_count_on_launch: false
    ask_timeout_on_launch: false
    ask_instance_groups_on_launch: false
    extra_vars: ""
    job_tags: ""
    force_handlers: false
    skip_tags: ""
    start_at_task: ""
    timeout: 0
    execution_environment: "AMZL Daily Demo - EE"
    host_config_key: ""
    survey_enabled: true
    survey_spec:
      name: ""
      spec:
        - type: multiplechoice
          choices:
            - "{%- raw -%}small{%- endraw -%}"
            - "{%- raw -%}medium{%- endraw -%}"
            - "{%- raw -%}large{%- endraw -%}"
          default: "{%- raw -%}medium{%- endraw -%}"
          required: true
          variable: vm_size
          question_name: "{%- raw -%}VM size{%- endraw -%}"
          question_description: "{%- raw -%}Amazon Linux 2023 t-shirt size on AWS{%- endraw -%}"
      description: "Pick a VM size"
    become_enabled: false
    diff_mode: false
    webhook_service: ""
    prevent_instance_group_fallback: false
...
