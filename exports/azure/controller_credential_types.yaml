---
controller_credential_types:
  - name: "AMZL Daily Demo - Secrets"
    description: |-
      {%- raw -%}
      Injects DEVOPS_PASSWORD, LINUX_SSH_PUBLIC_KEY, AWS_TF_STATE_BUCKET and AWS_DEFAULT_REGION for the AMZL demo playbooks
      {%- endraw -%}
    kind: "cloud"
    inputs:
        fields:
          - id: devops_password
            type: string
            label: devops account password
            secret: true
          - id: linux_ssh_public_key
            type: string
            label: Authorized SSH public key for devops
          - id: aws_tf_state_bucket
            type: string
            label: Terraform S3 state bucket
          - id: aws_default_region
            type: string
            label: AWS region
        required:
          - devops_password
          - linux_ssh_public_key

    injectors:
        env:
          DEVOPS_PASSWORD: "{%- raw -%} '{{devops_password}}' {%- endraw -%}"
          AWS_DEFAULT_REGION: "{%- raw -%} '{{aws_default_region}}' {%- endraw -%}"
          AWS_TF_STATE_BUCKET: "{%- raw -%} '{{aws_tf_state_bucket}}' {%- endraw -%}"
          LINUX_SSH_PUBLIC_KEY: "{%- raw -%} '{{linux_ssh_public_key}}' {%- endraw -%}"

...
