---
# ============================================================================
# inventory/hosts.yml — ONE inventory, environment selected with --limit
# ============================================================================
# This is the heart of the Red Hat Services standard this kit demonstrates:
# object variables are NOT loaded with vars_files/include_vars. They load
# IMPLICITLY from group_vars/ next to this file, by group membership.
#
#   ansible-playbook playbooks/config.yml -i inventory --limit dev ...
#
# picks up group_vars/aap/*  (shared objects, because dev is a child of aap)
# merged with group_vars/dev/* (that env's deltas + secrets).
#
# Each env "host" is just the anchor that makes its group_vars load. The work is
# local API calls against the gateway, so every host is ansible_connection:local.
# Replace the placeholder hostnames below with real gateway URLs — but keep real
# customer hostnames OUT of Git; put them in group_vars/<env>/connection.yml
# (use generic placeholders in committed .example files).
# ============================================================================
all:
  children:
    aap:
      children:
        # Export SOURCE — the production Azure managed AAP 2.7.
        azure:
          hosts:
            azure-prod:
              ansible_connection: local
              env_name: azure
        # Import TARGETS — on-prem AAP 2.7 containerized.
        dev:
          hosts:
            aap-dev:
              ansible_connection: local
              env_name: dev
        qa:
          hosts:
            aap-qa:
              ansible_connection: local
              env_name: qa
        prod:
          children:
            # Enterprise active/passive topology (COP-recommended pattern).
            # Config is pushed to BOTH sides simultaneously. The aap_site_role
            # variable (in each side's connection.yml) controls whether
            # schedules, notifications, and webhooks are enabled.
            # See: docs/references.md → Active/passive CaC blog series.
            prod_active:
              hosts:
                aap-prod-active:
                  ansible_connection: local
                  env_name: prod_active
            prod_passive:
              hosts:
                aap-prod-passive:
                  ansible_connection: local
                  env_name: prod_passive
