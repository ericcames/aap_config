---
# ============================================================================
# group_vars/aap/aap_settings.yml — settings shared by EVERY environment
# ============================================================================
# Loaded automatically for any host under the `aap` group (azure, dev, qa, prod)
# because this directory is named for that group. No include_vars needed.
#
# Connection credentials (aap_hostname, aap_username, aap_password,
# aap_validate_certs) are NOT here — they live in each env's group_vars:
#   - connection.yml    (hostname, cert validation — committed, not encrypted)
#   - secrets.yml       (username, password — ansible-vault encrypted)
# This follows the COP aap_configuration_template pattern.
# ============================================================================

# Let the dispatch role merge suffix-named variables so shared objects
# (controller_projects_all) combine with per-env ones (controller_projects_dev).
dispatch_include_wildcard_vars: true

# Do not log object bodies (which may contain resolved secrets) by default.
aap_configuration_secure_logging: true
