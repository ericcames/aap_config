# The rule is "rename the export's key to the variable dispatch expects, plus
# the _all / _<env> suffix" — which is not always just the export's key + _all.
# Check infra.aap_configuration/roles/dispatch/defaults/main.yml when in doubt.
# ============================================================================

aap_organizations_all:
  - name: "IT Service Automation"
