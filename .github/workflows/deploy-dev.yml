---
name: Deploy dev
# Auto-applies config to the on-prem DEV environment when config/inventory or
# playbooks change on main. Runs on a self-hosted runner that can reach the dev
# gateway.
#
# Connection credentials (hostname, username, password) are in the repo's
# vault-encrypted inventory/group_vars/dev/secrets.yml and committed
# connection.yml — NOT in GitHub secrets. The only GitHub Environment secret
# needed is VAULT_PASSWORD to decrypt them at runtime.
#
# See docs/github-setup.md.
on:
  push:
    branches: [main]
    paths:
      - "inventory/**"
      - "playbooks/**"
      - "collections/requirements.yml"
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  deploy:
    runs-on: [self-hosted, linux, aap]
    environment: dev
    steps:
      - uses: actions/checkout@v4

      - name: Install ansible-core (AAP 2.6 test baseline; bump to 2.18 at 2.7 cutover)
        run: pip install --user "ansible-core>=2.16,<2.17"

      - name: Install pinned collections
        run: ansible-galaxy collection install -r collections/requirements.yml

      - name: Write the vault password to a temp file
        run: |
          umask 077
          printf '%s' "${{ secrets.VAULT_PASSWORD }}" > "$RUNNER_TEMP/vp"

      - name: Validate (check mode)
        run: >-
          ansible-playbook playbooks/validate.yml
          -i inventory --limit dev
          --vault-id dev@"$RUNNER_TEMP/vp"

      - name: Apply
        run: >-
          ansible-playbook playbooks/config.yml
          -i inventory --limit dev
          --vault-id dev@"$RUNNER_TEMP/vp"

      - name: Remove the vault password file
        if: always()
        run: rm -f "$RUNNER_TEMP/vp"
