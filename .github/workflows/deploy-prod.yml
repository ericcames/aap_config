---
name: Deploy prod
# Manual promotion to PRODUCTION (enterprise active/passive topology).
# workflow_dispatch only, and both GitHub Environments (prod_active, prod_passive)
# should have REQUIRED REVIEWERS so a human approves before anything is applied.
#
# Both sides are deployed IN PARALLEL from the same commit — the COP-recommended
# pattern. Connection credentials and aap_site_role are in vault-encrypted
# group_vars and committed connection.yml files — NOT in GitHub secrets. The only
# GitHub Environment secret needed is VAULT_PASSWORD.
#
# See: docs/references.md → Active/passive CaC blog series.
on:
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  deploy-prod-active:
    runs-on: [self-hosted, linux, aap]
    environment: prod_active
    steps:
      - uses: actions/checkout@v4

      - name: Install ansible-core (AAP 2.6 test baseline; bump to 2.18 at 2.7 cutover)
        run: pip install --user "ansible-core>=2.16,<2.17"

      - name: Install pinned collections
        run: ansible-galaxy collection install -r collections/requirements.yml

      - name: Write the vault password to a temp file
        run: |
          umask 077
          printf '%s' "${{ secrets.VAULT_PASSWORD }}" > "$RUNNER_TEMP/vp"

      - name: Validate (check mode)
        run: >-
          ansible-playbook playbooks/validate.yml
          -i inventory --limit prod_active
          --vault-id prod@"$RUNNER_TEMP/vp"

      - name: Apply
        run: >-
          ansible-playbook playbooks/config.yml
          -i inventory --limit prod_active
          --vault-id prod@"$RUNNER_TEMP/vp"

      - name: Remove the vault password file
        if: always()
        run: rm -f "$RUNNER_TEMP/vp"

  deploy-prod-passive:
    runs-on: [self-hosted, linux, aap]
    environment: prod_passive
    steps:
      - uses: actions/checkout@v4

      - name: Install ansible-core (AAP 2.6 test baseline; bump to 2.18 at 2.7 cutover)
        run: pip install --user "ansible-core>=2.16,<2.17"

      - name: Install pinned collections
        run: ansible-galaxy collection install -r collections/requirements.yml

      - name: Write the vault password to a temp file
        run: |
          umask 077
          printf '%s' "${{ secrets.VAULT_PASSWORD }}" > "$RUNNER_TEMP/vp"

      - name: Validate (check mode)
        run: >-
          ansible-playbook playbooks/validate.yml
          -i inventory --limit prod_passive
          --vault-id prod@"$RUNNER_TEMP/vp"

      - name: Apply
        run: >-
          ansible-playbook playbooks/config.yml
          -i inventory --limit prod_passive
          --vault-id prod@"$RUNNER_TEMP/vp"

      - name: Remove the vault password file
        if: always()
        run: rm -f "$RUNNER_TEMP/vp"
