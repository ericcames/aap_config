---
name: Lint
# PR gate. yamllint + ansible-lint + the two secret-hygiene guards + an AGENTS.md
# staleness check. No secrets: ansible-lint runs offline (certified collections
# aren't installed in CI; .ansible-lint mocks what can't resolve).
#
# GitHub Enterprise Server without hosted runners? Change `runs-on: ubuntu-latest`
# to `runs-on: [self-hosted, linux]` — that is the only change needed.
on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  yamllint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install yamllint
      - run: yamllint .

  ansible-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install ansible-lint
      - run: ansible-lint

  secret-guards:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Vault-encryption guard
        run: bash utilities/check-vault-encrypted.sh
      - name: Export secret-leak guard
        run: bash utilities/scan-exports.sh

  skills-frontmatter:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Skills stay portable across Claude Code and Copilot CLI
        # yamllint is blind to Markdown frontmatter, so nothing else catches a
        # SKILL.md that stops loading. Copilot CLI accepts only name/description/
        # license; an extra key is the likeliest way to silently break one tool.
        run: |
          bad=0
          for f in .claude/skills/*/SKILL.md; do
            dir=$(basename "$(dirname "$f")")
            if [ "$(head -n1 "$f")" != "---" ]; then
              echo "$f: must start with '---' frontmatter"; bad=1; continue
            fi
            # Frontmatter = lines between the first '---' and the next one.
            fm=$(awk 'NR>1{if($0=="---")exit; print}' "$f")
            name=$(printf '%s\n' "$fm" | sed -n 's/^name:[[:space:]]*//p')
            desc=$(printf '%s\n' "$fm" | sed -n 's/^description:[[:space:]]*//p')
            [ -n "$name" ] || { echo "$f: missing 'name:'"; bad=1; }
            [ -n "$desc" ] || { echo "$f: missing 'description:'"; bad=1; }
            if [ -n "$name" ] && [ "$name" != "$dir" ]; then
              echo "$f: name '$name' does not match directory '$dir'"; bad=1
            fi
            # Only top-level keys; indented lines are continuations.
            for k in $(printf '%s\n' "$fm" | sed -n 's/^\([a-zA-Z_-]*\):.*/\1/p'); do
              case "$k" in
                name|description|license) ;;
                *) echo "$f: key '$k' is not portable — use only name/description/license"; bad=1 ;;
              esac
            done
            if ! grep -q "/$dir\`" AGENTS.md; then
              echo "AGENTS.md does not list skill: /$dir"; bad=1
            fi
          done
          if [ "$bad" -ne 0 ]; then
            echo "See AGENTS.md -> Repo-shipped skills for the frontmatter contract."
            exit 1
          fi
          echo "All skills are portable and listed in AGENTS.md."

  agents-md-fresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: AGENTS.md names every tracked top-level directory
        run: |
          missing=0
          # Only consider git-tracked directories, so gitignored caches
          # (.ansible/, collections/ansible_collections/) never trip this.
          for d in $(git ls-files | grep '/' | cut -d/ -f1 | sort -u); do
            if ! grep -q "\`$d/\`\|/$d/\| $d/" AGENTS.md; then
              echo "AGENTS.md does not mention top-level dir: $d/"
              missing=1
            fi
          done
          if [ "$missing" -ne 0 ]; then
            echo "Update AGENTS.md's directory map in this PR."
            exit 1
          fi
          echo "AGENTS.md directory map is current."
